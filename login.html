<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LRMS</title>
    <link rel="icon" type="image/x-icon" href="1.ico">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="js/db.js?v=3.14"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
        }

        /* Airy Pastel Mesh Gradient Background */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: #f8fafc;
            background-image:
                radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.08) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
            filter: blur(80px);
            animation: meshFloat 25s ease-in-out infinite alternate;
        }

        @keyframes meshFloat {
            0% {
                transform: scale(1) translate(0, 0);
            }

            100% {
                transform: scale(1.15) translate(3%, 3%);
            }
        }

        /* Frosted Glass Floating Card */
        .login-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            padding: 60px 48px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-section {
            text-align: center;
            margin-bottom: 45px;
        }

        .logo-frame {
            background: white;
            padding: 18px;
            border-radius: 22px;
            display: inline-block;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.04);
            margin-bottom: 24px;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .logo-frame img {
            height: 64px;
            width: auto;
        }

        .system-title {
            color: #0f172a;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
        }

        .bank-info {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        /* Clean Input Styling */
        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 10px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.9);
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .input-wrapper:focus-within {
            border-color: #7c3aed;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.08);
            transform: translateY(-1px);
        }

        .input-wrapper svg.field-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            width: 20px;
            height: 20px;
            stroke: #94a3b8;
            pointer-events: none;
        }

        .input-wrapper input {
            background: transparent;
            border: none;
            width: 100%;
            padding: 16px 20px 16px 52px;
            color: #1e293b;
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
        }

        /* Premium Submit Button */
        .btn-submit {
            background: linear-gradient(135deg, #7c3aed 0%, #6366f1 100%);
            color: white;
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.05rem;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 20px 30px -5px rgba(124, 58, 237, 0.5);
        }

        .error-box {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #ef4444;
            padding: 16px;
            border-radius: 18px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 25px;
            display: none;
            align-items: center;
            gap: 10px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .form-footer {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(226, 232, 240, 0.6);
            text-align: center;
        }

        .form-footer p {
            color: #94a3b8;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            margin: 4px;
        }

        .powered-by {
            color: #7c3aed !important;
        }
    </style>
</head>

<body>
    <div class="mesh-bg"></div>

    <div class="login-card">
        <div class="header-section">
            <div class="logo-frame">
                <img src="assets/logo.png" alt="Logo">
            </div>
            <h1 class="system-title">Welcome Back</h1>
            <p class="bank-info">Galapitiyagama Sanasa Bank</p>
        </div>

        <div id="errorMessage" class="error-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="errorText">Invalid account credentials.</span>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>User ID</label>
                <div class="input-wrapper">
                    <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
                </div>
            </div>

            <div class="input-group">
                <label>Passcode</label>
                <div class="input-wrapper">
                    <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="password" placeholder="••••••••" required
                        autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-submit" id="loginBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
                Unlock System
            </button>
        </form>

        <div class="form-footer">
            <p>SECURE PORTAL 2.0</p>
            <p class="powered-by">POWERED BY IRAASOFT SOLUTION</p>
        </div>
    </div>

    <script src="js/app.js?v=3.14"></script>
    <script>
        if (sessionStorage.getItem('lrms_auth') === 'true') window.location.replace('index.html');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const origHTML = btn.innerHTML;
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 0.8s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Authenticating…`;
            btn.disabled = true;

            const username = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const errBox = document.getElementById('errorMessage');
            const errText = document.getElementById('errorText');
            errBox.style.display = 'none';

            try {
                const user = await loginUser(username, pass);
                if (user.error) throw new Error(user.error);
                sessionStorage.setItem('lrms_auth', 'true');
                sessionStorage.setItem('lrms_user', user.username);
                sessionStorage.setItem('lrms_role', user.role || 'user');
                window.location.replace('index.html');
            } catch (err) {
                btn.innerHTML = origHTML;
                btn.disabled = false;
                errBox.style.display = 'flex';
                errText.innerText = err.message || 'Login failed.';
                document.getElementById('password').value = '';
            }
        });
    </script>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>

</html>
